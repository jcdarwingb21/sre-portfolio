name: CI pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: sre-portfolio-app

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run pytest
        run: pytest app/test_main.py -v --tb=short

  # ── 2. Build Docker image ────────────────────────────────────────────────────
  build:
    name: Build image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ steps.meta.outputs.version }} ./app

      - name: Smoke test container
        run: |
          docker run -d --name smoke -p 5000:5000 $IMAGE_NAME:${{ steps.meta.outputs.version }}
          sleep 5
          curl --fail http://localhost:5000/health
          curl --fail http://localhost:5000/ready
          docker stop smoke

  # ── 3. Security scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Trivy security scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t $IMAGE_NAME:scan ./app

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

