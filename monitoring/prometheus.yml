global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'dev'
    project: 'sre-portfolio'

# Alerting rules file
rule_files:
  - "alerts.yml"

scrape_configs:
  # Scrape the Flask app metrics endpoint
  - job_name: 'sre-portfolio-app'
    static_configs:
      - targets: ['app:5000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
